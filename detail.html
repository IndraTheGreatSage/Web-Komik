<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Detail komik dan daftar chapter di KomikLoka.">
    <title>Detail Komik - KomikLoka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header compact">
        <a class="brand" href="index.html" aria-label="KomikLoka beranda">
            <span class="brand-mark">KL</span>
            <span>
                <strong>KomikLoka</strong>
                <small>Detail komik</small>
            </span>
        </a>
        <nav class="top-nav" aria-label="Navigasi utama">
            <a href="index.html">Katalog</a>
        </nav>
    </header>

    <main id="detailRoot" class="detail-root">
        <section class="detail-hero" aria-live="polite">
            <div class="detail-cover">
                <img id="detailCover" alt="" loading="eager">
            </div>
            <div class="detail-copy">
                <p class="eyebrow" id="detailType">Memuat</p>
                <h1 id="detailTitle">Memuat detail komik...</h1>
                <p id="detailSummary" class="lead"></p>
                <div class="meta-row" id="detailMeta"></div>
                <div class="tag-list" id="detailTags"></div>
                <div class="action-row">
                    <a class="primary-action" id="startReading" href="#">Mulai baca</a>
                    <a class="ghost-action" href="index.html">Kembali</a>
                </div>
            </div>
        </section>

        <section class="chapter-section" aria-labelledby="judul-chapter">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Chapter</p>
                    <h2 id="judul-chapter">Daftar chapter</h2>
                </div>
                <div class="chapter-actions" aria-label="Pengaturan chapter">
                    <p id="chapterCount" class="result-count">0 chapter</p>
                    <label class="tool-control" for="chapterSort">
                        <span>Urut</span>
                        <select id="chapterSort">
                            <option value="number">Nomor chapter</option>
                            <option value="date">Tanggal update</option>
                            <option value="title">Judul</option>
                        </select>
                    </label>
                    <button class="sort-toggle" type="button" id="chapterDirection">Terbaru dulu</button>
                </div>
            </div>
            
            <div class="chapter-search-wrapper">
                <input 
                    type="search" 
                    id="chapterSearch" 
                    placeholder="Cari chapter..." 
                    autocomplete="off"
                >
                <button type="button" id="clearSearch" class="ghost-action" hidden>✕</button>
            </div>

            <div class="chapter-list" id="chapterList"></div>
            
            <div class="chapter-show-more" id="chapterShowMore" hidden>
                <button type="button" id="showAllChapters" class="ghost-action">
                    <span>Tampilkan semua chapter</span>
                    <span class="arrow-icon">▼</span>
                </button>
            </div>
        </section>

        <section class="comment-section" aria-labelledby="judul-komentar">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Diskusi</p>
                    <h2 id="judul-komentar">Komentar</h2>
                </div>
                <div class="comment-stats">
                    <p id="commentCount" class="result-count">0 komentar</p>
                    <button type="button" id="sortComments" class="ghost-action" style="font-size: 0.85rem; padding: 6px 12px;">Terbaru</button>
                </div>
            </div>

            <div class="comment-input-area" id="commentInputArea">
                <div class="user-avatar" id="currentUserAvatar">
                    <span>?</span>
                </div>
                <div class="comment-input-wrapper">
                    <div id="loginPrompt" class="login-prompt">
                        <p>Login untuk ikut berdiskusi</p>
                        <a href="login.html" class="primary-action">Login</a>
                    </div>
                    <form id="commentForm" class="comment-form" hidden>
                        <textarea 
                            id="commentText" 
                            rows="3" 
                            maxlength="1000" 
                            placeholder="Apa pendapatmu tentang komik ini?" 
                            required
                        ></textarea>
                        <div class="comment-form-actions">
                            <span class="char-count" id="charCount">0/1000</span>
                            <button type="submit" class="primary-action">Kirim</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="comments-list" id="commentsList">
                <div class="comments-loading" id="commentsLoading" hidden>
                    <p>Memuat komentar...</p>
                </div>
            </div>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script src="detail.js"></script>
</body>
</html>
