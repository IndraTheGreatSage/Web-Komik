<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KomikLoka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="./" aria-label="KomikLoka beranda">
            <span class="brand-mark">KL</span>
            <span>
                <strong>KomikLoka</strong>
                <small>Manhua, manhwa, manga</small>
            </span>
        </a>
        <nav class="top-nav" aria-label="Navigasi utama">
            <a href="./">Beranda</a>
            <a href="register.html" class="primary-action">Daftar</a>
        </nav>
    </header>

    <main>
        <section class="auth-section">
            <div class="auth-container">
                <div class="auth-header">
                    <h1>Login</h1>
                    <p>Masuk untuk melanjutkan membaca komik favoritmu</p>
                </div>
                
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required 
                            placeholder="contoh@email.com"
                            autocomplete="email"
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            placeholder="Masukkan password"
                            autocomplete="current-password"
                        >
                    </div>

                    <div id="captchaContainer" class="captcha-container" hidden>
                        <label for="captchaAnswer">Verifikasi: Berapa hasil <span id="captchaQuestion"></span>?</label>
                        <input
                            type="text"
                            id="captchaAnswer"
                            name="captchaAnswer"
                            placeholder="Masukkan jawaban"
                            autocomplete="off"
                        >
                    </div>

                    <div id="loginError" class="error-message" hidden></div>

                    <button type="submit" class="primary-action full-width">Login</button>
                </form>

                <div class="auth-footer">
                    <p>Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
                </div>
            </div>
        </section>
    </main>

    <script src="auth.js"></script>
    <script>
        // Wait for auth to be loaded
        document.addEventListener('DOMContentLoaded', function() {
            // Check if auth is loaded
            if (typeof auth === 'undefined') {
                console.error('Auth object not loaded');
                return;
            }

            // Check if already logged in
            if (auth.isAuthenticated()) {
                window.location.href = './';
            }

            // CAPTCHA logic
            let captchaAnswer = 0;

            const generateCaptcha = () => {
                const num1 = Math.floor(Math.random() * 10) + 1;
                const num2 = Math.floor(Math.random() * 10) + 1;
                captchaAnswer = num1 + num2;
                document.getElementById('captchaQuestion').textContent = `${num1} + ${num2}`;
            };

            const showCaptcha = () => {
                const captchaContainer = document.getElementById('captchaContainer');
                const captchaInput = document.getElementById('captchaAnswer');
                if (captchaContainer && captchaInput) {
                    captchaContainer.hidden = false;
                    captchaInput.required = true;
                    generateCaptcha();
                }
            };

            const hideCaptcha = () => {
                const captchaContainer = document.getElementById('captchaContainer');
                const captchaInput = document.getElementById('captchaAnswer');
                if (captchaContainer && captchaInput) {
                    captchaContainer.hidden = true;
                    captchaInput.required = false;
                    captchaInput.value = '';
                }
            };

            // Handle login form submission
            const loginForm = document.getElementById('loginForm');
            const loginError = document.getElementById('loginError');

            if (!loginForm) {
                console.error('Login form not found');
                return;
            }

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const captchaInput = document.getElementById('captchaAnswer').value;

                console.log('Login attempt:', email);

                // Clear previous error
                loginError.hidden = true;
                loginError.textContent = '';

                // Attempt login
                const result = auth.login(email, password, captchaInput);

                console.log('Login result:', result);

                if (result.success) {
                    // Redirect to home page
                    window.location.href = './';
                } else if (result.error === 'CAPTCHA_REQUIRED') {
                    // Show CAPTCHA
                    showCaptcha();
                    loginError.textContent = 'Silakan selesaikan verifikasi untuk melanjutkan';
                    loginError.hidden = false;
                } else {
                    // Show error
                    loginError.textContent = result.error;
                    loginError.hidden = false;

                    // Check if CAPTCHA should be shown
                    const failedAttempts = auth.getFailedAttempts(email);
                    if (failedAttempts >= 3) {
                        showCaptcha();
                    }
                }
            });
        });
    </script>
</body>
</html>
