<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - KomikLoka</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>
    <header class="site-header">
        <a class="brand" href="./" aria-label="KomikLoka beranda">
            <span class="brand-mark">KL</span>
            <span>
                <strong>KomikLoka</strong>
                <small>Manhua, manhwa, manga</small>
            </span>
        </a>
        <nav class="top-nav" aria-label="Navigasi utama">
            <a href="./">Beranda</a>
            <a href="login" class="ghost-action">Login</a>
        </nav>
    </header>

    <main>
        <section class="auth-section">
            <div class="auth-container">
                <div class="auth-header">
                    <h1>Daftar</h1>
                    <p>Buat akun untuk mulai membaca komik favoritmu</p>
                </div>
                
                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            required 
                            placeholder="Masukkan username"
                            autocomplete="username"
                            minlength="3"
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required 
                            placeholder="contoh@email.com"
                            autocomplete="email"
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required 
                            placeholder="Minimal 6 karakter"
                            autocomplete="new-password"
                            minlength="6"
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Konfirmasi Password</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            required 
                            placeholder="Ulangi password"
                            autocomplete="new-password"
                        >
                    </div>
                    
                    <div id="registerError" class="error-message" hidden></div>

                    <button type="submit" class="primary-action full-width">Daftar</button>

                    <div class="auth-divider">
                        <span>atau</span>
                    </div>

                    <button type="button" id="googleSignUpBtn" class="google-signin-btn">
                        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17.64 9.2c0-.637-.057-1.252-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
                            <path d="M9.003 18c2.43 0 4.467-.806 5.956-2.18l-2.909-2.259c-.806.54-1.836.86-3.047.86-2.344 0-4.328-1.584-5.036-3.715H.957v2.332C2.438 15.983 5.485 18 9.003 18z" fill="#34A853"/>
                            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957C.347 6.175 0 7.55 0 9c0 1.45.347 2.825.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                            <path d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.428 0 9.002 0 5.485 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.159 6.656 3.58 9.003 3.58z" fill="#EA4335"/>
                        </svg>
                        <span>Continue with Google</span>
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Sudah punya akun? <a href="login">Login sekarang</a></p>
                </div>
            </div>
        </section>
    </main>

    <script src="auth.js"></script>
    <script>
        // Firebase Configuration - GANTI dengan config Firebase Anda
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        try {
            firebase.initializeApp(firebaseConfig);
        } catch (e) {
            console.error('Firebase initialization error:', e);
        }

        // Check if already logged in
        if (auth.isAuthenticated()) {
            window.location.href = './';
        }

        // Handle register form submission
        const registerForm = document.getElementById('registerForm');
        const registerError = document.getElementById('registerError');

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Clear previous error
            registerError.hidden = true;
            registerError.textContent = '';

            // Validate passwords match
            if (password !== confirmPassword) {
                registerError.textContent = 'Password tidak cocok';
                registerError.hidden = false;
                return;
            }

            // Attempt registration
            const result = auth.register(username, email, password);

            if (result.success) {
                // Auto-login after registration
                auth.login(email, password);
                // Redirect to home page
                window.location.href = './';
            } else {
                // Show error
                registerError.textContent = result.error;
                registerError.hidden = false;
            }
        });

        // Google Sign-Up
        const googleSignUpBtn = document.getElementById('googleSignUpBtn');

        if (googleSignUpBtn && firebase.auth) {
            googleSignUpBtn.addEventListener('click', async () => {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    const result = await firebase.auth().signInWithPopup(provider);

                    const user = result.user;
                    const email = user.email;
                    const username = user.displayName || email.split('@')[0];

                    // Check if user already exists
                    const users = auth.getUsers();
                    const existingUser = users.find(u => u.email.toLowerCase() === email.toLowerCase());

                    if (existingUser) {
                        // Login existing user
                        const loginResult = auth.login(email, existingUser.password);
                        if (loginResult.success) {
                            window.location.href = './';
                        } else {
                            registerError.textContent = 'Email sudah terdaftar. Silakan login.';
                            registerError.hidden = false;
                        }
                    } else {
                        // Register new user
                        const registerResult = auth.register(username, email, Math.random().toString(36).slice(-8));
                        if (registerResult.success) {
                            const loginResult = auth.login(email, registerResult.user.password);
                            if (loginResult.success) {
                                window.location.href = './';
                            }
                        } else {
                            registerError.textContent = registerResult.error;
                            registerError.hidden = false;
                        }
                    }
                } catch (error) {
                    console.error('Google Sign-Up error:', error);
                    registerError.textContent = 'Gagal daftar dengan Google: ' + error.message;
                    registerError.hidden = false;
                }
            });
        } else {
            // Hide Google button if Firebase not configured
            if (googleSignUpBtn) {
                googleSignUpBtn.hidden = true;
            }
        }
    </script>
</body>
</html>
