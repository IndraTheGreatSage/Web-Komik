<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pustaka komik di KomikLoka.">
    <title>Pustaka - KomikLoka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="./" aria-label="KomikLoka beranda">
            <span class="brand-mark">KL</span>
            <span>
                <strong>KomikLoka</strong>
                <small>Pustaka</small>
            </span>
        </a>
        <nav class="top-nav" aria-label="Navigasi utama">
            <div id="authNav" style="display: flex; gap: 8px; align-items: center;">
                <a href="login.html" class="ghost-action">Login</a>
                <a href="register.html" class="primary-action">Daftar</a>
            </div>
            <div id="userNav" style="display: none; gap: 8px; align-items: center;">
                <a href="user-profile.html" class="ghost-action" id="profileLink">Profil</a>
                <button id="logoutBtnHeader" class="ghost-action" style="background: none; border: none; cursor: pointer; color: inherit; font-weight: 800; padding: 0 14px;">Logout</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="catalog-section" aria-labelledby="judul-pustaka">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Pustaka</p>
                    <h2 id="judul-pustaka">Komik Favorit</h2>
                </div>
                <p id="resultCount" class="result-count">0 komik</p>
            </div>
            <div class="comic-grid" id="comicGrid"></div>
            <p class="empty-state" id="emptyState">Belum ada komik di pustaka. Login dan tambahkan komik ke pustaka.</p>
        </section>
    </main>

    <nav class="bottom-nav" aria-label="Navigasi bawah">
        <a href="./" class="nav-item" data-page="discover">
            <span class="nav-icon">🔍</span>
            <span class="nav-label">Discover</span>
        </a>
        <a href="library.html" class="nav-item active" data-page="library">
            <span class="nav-icon">📚</span>
            <span class="nav-label">Pustaka</span>
        </a>
        <a href="history.html" class="nav-item" data-page="history">
            <span class="nav-icon">📖</span>
            <span class="nav-label">History</span>
        </a>
        <a href="settings.html" class="nav-item" data-page="settings">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Settings</span>
        </a>
    </nav>

    <script src="config.js"></script>
    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script>
        (async () => {
            const escapeHtml = (value) => {
                return String(value ?? "")
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;")
                    .replaceAll('"', "&quot;")
                    .replaceAll("'", "&#039;");
            };

            const getDetailUrl = (comic) => {
                return `detail.html?id=${encodeURIComponent(comic.id)}`;
            };

            const getReadableChapter = (comic) => {
                return Array.isArray(comic.chapters) && comic.chapters.length > 0
                    ? comic.chapters[0]
                    : null;
            };

            const getReadUrl = (comic) => {
                const chapter = getReadableChapter(comic);
                if (!chapter) return getDetailUrl(comic);
                return `reader.html?id=${encodeURIComponent(comic.id)}&chapter=${encodeURIComponent(chapter.id)}`;
            };

            const renderCard = (comic) => {
                const chapter = getReadableChapter(comic);
                const detailUrl = getDetailUrl(comic);
                const readUrl = getReadUrl(comic);
                const genres = (comic.genres || []).slice(0, 3);
                const summary = comic.summary || "Detail chapter dan sinopsis tersedia dari API Komiku.";

                return `
                    <article class="comic-card">
                        <a class="cover-link" href="${detailUrl}">
                            <img src="${escapeHtml(comic.cover)}" alt="Cover ${escapeHtml(comic.title)}" loading="lazy">
                        </a>
                        <div class="comic-card-body">
                            <div class="card-topline">
                                <span>${escapeHtml(comic.type || "Komik")}</span>
                                <span>${escapeHtml(comic.status || "Update")}</span>
                            </div>
                            <h3><a href="${detailUrl}">${escapeHtml(comic.title)}</a></h3>
                            <p>${escapeHtml(summary)}</p>
                            <div class="tag-list">
                                ${genres.map((genre) => `<span>${escapeHtml(genre)}</span>`).join("")}
                            </div>
                            <a class="chapter-pill" href="${readUrl}">${escapeHtml(chapter?.title || "Lihat detail")}</a>
                        </div>
                    </article>
                `;
            };

            const comicGrid = document.getElementById("comicGrid");
            const emptyState = document.getElementById("emptyState");
            const resultCount = document.getElementById("resultCount");

            const renderLibrary = async () => {
                const user = auth.getCurrentUser();
                if (!user) {
                    if (comicGrid) comicGrid.innerHTML = "";
                    if (emptyState) emptyState.textContent = "Login untuk melihat pustaka komik.";
                    if (emptyState) emptyState.hidden = false;
                    if (resultCount) resultCount.textContent = "0 komik";
                    return;
                }

                const libraryKey = `komikloka:library:${user.username}`;
                const libraryData = localStorage.getItem(libraryKey);
                const libraryIds = libraryData ? JSON.parse(libraryData) : [];

                if (libraryIds.length === 0) {
                    if (comicGrid) comicGrid.innerHTML = "";
                    if (emptyState) emptyState.textContent = "Belum ada komik di pustaka. Tambahkan komik dari halaman detail.";
                    if (emptyState) emptyState.hidden = false;
                    if (resultCount) resultCount.textContent = "0 komik";
                    return;
                }

                const comics = window.KomikData ? await window.KomikData.loadLibrary() : [];
                const libraryComics = comics.filter(comic => libraryIds.includes(comic.id));

                if (comicGrid) {
                    comicGrid.innerHTML = libraryComics.map(renderCard).join("");
                }
                if (emptyState) emptyState.hidden = libraryComics.length > 0;
                if (resultCount) resultCount.textContent = `${libraryComics.length} komik`;
            };

            // Update auth nav
            function updateAuthNav() {
                const authNav = document.getElementById('authNav');
                const userNav = document.getElementById('userNav');
                
                if (auth.isAuthenticated()) {
                    authNav.style.display = 'none';
                    userNav.style.display = 'flex';
                } else {
                    authNav.style.display = 'flex';
                    userNav.style.display = 'none';
                }
            }

            document.getElementById('logoutBtnHeader').addEventListener('click', () => {
                auth.logout();
            });

            updateAuthNav();
            renderLibrary();

            // Listen for auth changes (custom event + storage event)
            window.addEventListener('authChange', (e) => {
                updateAuthNav();
                renderLibrary();
            });

            window.addEventListener('storage', (e) => {
                if (e.key === 'komikloka_user') {
                    updateAuthNav();
                    renderLibrary();
                }
            });
        })();
    </script>
</body>
</html>
