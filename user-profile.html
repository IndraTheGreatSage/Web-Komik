<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - KomikLoka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="./" aria-label="KomikLoka beranda">
            <span class="brand-mark">KL</span>
            <span>
                <strong>KomikLoka</strong>
                <small>Profil</small>
            </span>
        </a>
        <nav class="top-nav" aria-label="Navigasi utama">
            <button id="logoutBtnHeader" class="ghost-action" style="background: none; border: none; cursor: pointer; color: inherit; font-weight: 800; padding: 0 14px;">Logout</button>
        </nav>
    </header>

    <main>
        <section class="profile-section" aria-labelledby="judul-profil">
            <div class="profile-container">
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar">
                        <span id="avatarInitial">?</span>
                    </div>
                    <div class="profile-info">
                        <h1 id="profileUsername">Loading...</h1>
                        <div class="profile-badges" id="profileBadges"></div>
                        <p class="profile-joined">Bergabung sejak <span id="profileJoined">-</span></p>
                    </div>
                </div>

                <div class="profile-stats">
                    <div class="stat-card">
                        <span class="stat-value" id="libraryCount">0</span>
                        <span class="stat-label">Komik di Pustaka</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="historyCount">0</span>
                        <span class="stat-label">Chapter Dibaca</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="commentCount">0</span>
                        <span class="stat-label">Komentar</span>
                    </div>
                </div>

                <div class="profile-settings">
                    <h2>Pengaturan Profil</h2>
                    
                    <div class="form-group">
                        <label for="editUsername">Username</label>
                        <input type="text" id="editUsername" placeholder="Username baru">
                    </div>

                    <div class="form-group">
                        <label for="editPassword">Password Baru (opsional)</label>
                        <input type="password" id="editPassword" placeholder="Masukkan password baru jika ingin mengubah">
                    </div>

                    <div class="form-group">
                        <label for="currentPassword">Password Saat Ini</label>
                        <input type="password" id="currentPassword" placeholder="Masukkan password saat ini untuk menyimpan perubahan">
                    </div>

                    <button id="saveProfile" class="primary-action full-width">Simpan Perubahan</button>
                    <div id="profileError" class="error-message" hidden></div>
                    <div id="profileSuccess" class="success-message" hidden></div>
                </div>

                <div class="profile-danger-zone">
                    <h2>Zona Bahaya</h2>
                    <p class="danger-warning">Tindakan ini tidak dapat dibatalkan.</p>
                    <button id="deleteAccount" class="ghost-action" style="color: var(--ember); border-color: var(--ember);">Hapus Akun</button>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav" aria-label="Navigasi bawah">
        <a href="./" class="nav-item" data-page="discover">
            <span class="nav-icon">🔍</span>
            <span class="nav-label">Discover</span>
        </a>
        <a href="library.html" class="nav-item" data-page="library">
            <span class="nav-icon">📚</span>
            <span class="nav-label">Pustaka</span>
        </a>
        <a href="history.html" class="nav-item" data-page="history">
            <span class="nav-icon">📖</span>
            <span class="nav-label">History</span>
        </a>
        <a href="settings.html" class="nav-item" data-page="settings">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Settings</span>
        </a>
    </nav>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        // Check if logged in
        if (!auth.isAuthenticated()) {
            window.location.href = 'login.html';
        }

        const user = auth.getCurrentUser();
        const profileAvatar = document.getElementById('profileAvatar');
        const avatarInitial = document.getElementById('avatarInitial');
        const profileUsername = document.getElementById('profileUsername');
        const profileBadges = document.getElementById('profileBadges');
        const profileJoined = document.getElementById('profileJoined');
        const libraryCount = document.getElementById('libraryCount');
        const historyCount = document.getElementById('historyCount');
        const commentCount = document.getElementById('commentCount');
        const editUsername = document.getElementById('editUsername');
        const editPassword = document.getElementById('editPassword');
        const currentPassword = document.getElementById('currentPassword');
        const saveProfile = document.getElementById('saveProfile');
        const profileError = document.getElementById('profileError');
        const profileSuccess = document.getElementById('profileSuccess');
        const deleteAccount = document.getElementById('deleteAccount');

        // Load profile data
        const loadProfile = () => {
            if (!user) return;

            // Avatar
            const avatarColor = getUserAvatar(user.username);
            profileAvatar.style.background = avatarColor;
            avatarInitial.textContent = user.username.charAt(0).toUpperCase();

            // Username
            profileUsername.textContent = user.username;
            editUsername.value = user.username;

            // Badges
            let badgesHTML = '';
            if (user.isOwner) {
                badgesHTML += '<span class="owner-badge">Owner</span>';
            }
            if (user.isVerified) {
                badgesHTML += '<span class="verified-badge">✓ Verified</span>';
            }
            profileBadges.innerHTML = badgesHTML;

            // Joined date
            const users = auth.getUsers();
            const userData = users.find(u => u.id === user.id);
            if (userData && userData.createdAt) {
                const joinedDate = new Date(userData.createdAt);
                profileJoined.textContent = joinedDate.toLocaleDateString('id-ID', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });
            }

            // Stats
            const libraryKey = `komikloka:library:${user.username}`;
            const libraryData = localStorage.getItem(libraryKey);
            const libraryIds = libraryData ? JSON.parse(libraryData) : [];
            libraryCount.textContent = libraryIds.length;

            const historyKey = `komikloka:history:${user.username}`;
            const historyData = localStorage.getItem(historyKey);
            const history = historyData ? JSON.parse(historyData) : [];
            historyCount.textContent = history.length;

            // Count comments across all comics
            let totalComments = 0;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('komikloka:comments:')) {
                    const comments = JSON.parse(localStorage.getItem(key) || '[]');
                    totalComments += comments.filter(c => c.author === user.username).length;
                }
            }
            commentCount.textContent = totalComments;
        };

        // Get user avatar color
        const getUserAvatar = (username) => {
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F'];
            let hash = 0;
            for (let i = 0; i < username.length; i++) {
                hash = username.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        };

        // Save profile
        saveProfile.addEventListener('click', () => {
            profileError.hidden = true;
            profileSuccess.hidden = true;

            const newUsername = editUsername.value.trim();
            const newPassword = editPassword.value;
            const currentPass = currentPassword.value;

            if (!currentPass) {
                profileError.textContent = 'Password saat ini wajib diisi untuk menyimpan perubahan';
                profileError.hidden = false;
                return;
            }

            const users = auth.getUsers();
            const userIndex = users.findIndex(u => u.id === user.id);

            if (userIndex === -1) {
                profileError.textContent = 'User tidak ditemukan';
                profileError.hidden = false;
                return;
            }

            // Verify current password
            if (users[userIndex].password !== currentPass) {
                profileError.textContent = 'Password saat ini salah';
                profileError.hidden = false;
                return;
            }

            // Check if username already exists (if changing)
            if (newUsername !== user.username) {
                const usernameExists = users.some(u => u.username.toLowerCase() === newUsername.toLowerCase() && u.id !== user.id);
                if (usernameExists) {
                    profileError.textContent = 'Username sudah digunakan';
                    profileError.hidden = false;
                    return;
                }
            }

            // Update user data
            const updates = {};
            if (newUsername !== user.username) {
                updates.username = newUsername;
            }
            if (newPassword) {
                if (newPassword.length < 6) {
                    profileError.textContent = 'Password minimal 6 karakter';
                    profileError.hidden = false;
                    return;
                }
                updates.password = newPassword;
            }

            const result = auth.updateProfile(updates);

            if (result.success) {
                profileSuccess.textContent = 'Profil berhasil diperbarui';
                profileSuccess.hidden = false;
                editPassword.value = '';
                currentPassword.value = '';
                loadProfile();
            } else {
                profileError.textContent = result.error;
                profileError.hidden = false;
            }
        });

        // Delete account
        deleteAccount.addEventListener('click', () => {
            if (confirm('Apakah Anda yakin ingin menghapus akun? Semua data Anda akan dihapus permanen dan tidak dapat dikembalikan.')) {
                if (confirm('Ini adalah tindakan permanen. Ketik "HAPUS" untuk mengkonfirmasi.')) {
                    const confirmation = prompt('Ketik "HAPUS" untuk mengkonfirmasi penghapusan akun:');
                    if (confirmation === 'HAPUS') {
                        // Delete user data
                        const users = auth.getUsers();
                        const filteredUsers = users.filter(u => u.id !== user.id);
                        localStorage.setItem('komikloka_users', JSON.stringify(filteredUsers));

                        // Delete user's library
                        const libraryKey = `komikloka:library:${user.username}`;
                        localStorage.removeItem(libraryKey);

                        // Delete user's history
                        const historyKey = `komikloka:history:${user.username}`;
                        localStorage.removeItem(historyKey);

                        // Delete user's comments
                        for (let i = 0; i < localStorage.length; i++) {
                            const key = localStorage.key(i);
                            if (key.startsWith('komikloka:comments:')) {
                                const comments = JSON.parse(localStorage.getItem(key) || '[]');
                                const filteredComments = comments.filter(c => c.author !== user.username);
                                localStorage.setItem(key, JSON.stringify(filteredComments));
                            }
                        }

                        // Logout
                        auth.logout();
                    }
                }
            }
        });

        // Logout
        document.getElementById('logoutBtnHeader').addEventListener('click', () => {
            auth.logout();
        });

        // Load profile on page load
        loadProfile();
    </script>
</body>
</html>
